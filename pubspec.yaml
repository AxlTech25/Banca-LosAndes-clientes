name: appbanco_losandes_clientes
description: "App movil de Banco Los Andes para clientes."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.1
  supabase_flutter: ^2.14.0
  file_picker: ^8.1.7
  url_launcher: ^6.3.1
  signature: ^5.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo_banco_los_andes.png
  adaptive_icon_background: "#59C8F2"
  adaptive_icon_foreground: assets/images/logo_banco_los_andes.png
  web:
    generate: true
    image_path: assets/images/logo_banco_los_andes.png
    background_color: "#59C8F2"
    theme_color: "#59C8F2"
  windows:
    generate: true
    image_path: assets/images/logo_banco_los_andes.png
  macos:
    generate: true
    image_path: assets/images/logo_banco_los_andes.png

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/logo_banco_los_andes.png
